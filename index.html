<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpellVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="badge">SPELLING BEE</p>
      <h1>SpellVerse</h1>
      <p class="subtitle">Voice Spelling Practice</p>
    </section>

    <section class="game-card" aria-live="polite">
      <div class="top-controls">
        <div class="side-stat">
          <span class="hud-label">Score</span>
          <strong id="score">0/0 correct</strong>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill"></div>
          </div>
        </div>
        <button id="startBtn" type="button">Start Spelling</button>
        <div class="side-stat"><span class="hud-label">Time</span><strong id="timer">60s</strong></div>
      </div>

      <div class="level-row">
        <div class="level-picker">
          <label for="levelSelect">Bee Level</label>
          <select id="levelSelect">
            <option value="level1">Level 1</option>
            <option value="level2">Level 2</option>
            <option value="level3">Level 3</option>
          </select>
        </div>
        <button id="speakWord" class="ghost-btn" type="button" disabled>Hear Word</button>
      </div>

      <div class="prompt-area instruction-callout">
        <p id="roundText">Press Start Spelling to begin.</p>
        <p id="infoText" class="info-text">Say “meaning” or “use in a sentence” any time during a round.</p>
      </div>

      <div class="button-row">
        <button id="pauseBtn" type="button" disabled>Stop</button>
        <button id="skipBtn" class="ghost-btn" type="button" disabled>Skip</button>
        <button id="endLevelBtn" class="ghost-btn" type="button" disabled>End Level</button>
        <button id="nextLevelBtn" class="ghost-btn" type="button" disabled>Next Level</button>
      </div>

      <p id="feedback" class="feedback"></p>
    </section>
  </main>

  <script src="env.js"></script>
  <script src="script.js"></script>
</body>
</html>
